          PROBE_STAGE: ${{ github.event.inputs.stream_acceptance_probe_stage }}
          PROBE_MAX_UPDATES: ""
          PROBE_OUTPUT_DIR: ""
          EXPECTED_COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          PROBE_DURATION_SECONDS="${PROBE_DURATION_SECONDS:-900}"
          PROBE_STAGE="${PROBE_STAGE:-all}"
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 \
            -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            APP_DIR="${APP_DIR}" PROBE_DURATION_SECONDS="${PROBE_DURATION_SECONDS}" PROBE_STAGE="${PROBE_STAGE}" PROBE_MAX_UPDATES="${PROBE_MAX_UPDATES}" PROBE_OUTPUT_DIR="${PROBE_OUTPUT_DIR}" EXPECTED_COMMIT_SHA="${EXPECTED_COMMIT_SHA}" 'bash -se' <<'EOF'
          set -euo pipefail
          APP_DIR="${APP_DIR}"
          BIN="${APP_DIR}/target/release/cli"
          ENV_FILE="/home/ubuntu/pump-launch-quant.env"
          VALIDATE_CONFIG=(--config "${APP_DIR}/config/default.toml" --config-override "${APP_DIR}/config/local.toml")
          PROBE_PARENT="${PROBE_OUTPUT_DIR:-${APP_DIR}/data/reports/material_hunter_stream_acceptance_probe}"
          mkdir -p "${PROBE_PARENT}"

          if sudo systemctl list-units --type=service --state=running 'pump-launch-quant-material-hunter-*.service' --no-legend | grep -q .; then
            echo "::error::A material hunter service is active; refusing stream acceptance probe overlap"
            exit 1
          fi

          if [[ -f "${ENV_FILE}" ]]; then
            set -a
            source "${ENV_FILE}"
            set +a
          else
            echo "::error::VPS env file not found at ${ENV_FILE}"
            exit 1
          fi

          if [[ -f "${APP_DIR}/target/release/build_info.json" ]]; then
            DEPLOYED_COMMIT="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("git_sha",""))' "${APP_DIR}/target/release/build_info.json")"
          else
            DEPLOYED_COMMIT=""
          fi
          echo "material-hunter-stream-acceptance-probe deployed_commit=${DEPLOYED_COMMIT}"
          echo "material-hunter-stream-acceptance-probe expected_commit=${EXPECTED_COMMIT_SHA}"
          if [[ -z "${DEPLOYED_COMMIT}" || "${DEPLOYED_COMMIT}" != "${EXPECTED_COMMIT_SHA}" ]]; then
            echo "::error::Deployed CLI commit mismatch for stream acceptance probe"
            exit 1
          fi

          PROBE_CMD=("${BIN}" material-hunter-stream-acceptance-probe "${VALIDATE_CONFIG[@]}" --duration-seconds "${PROBE_DURATION_SECONDS}" --stage "${PROBE_STAGE}" --report-dir "${PROBE_PARENT}" --json)
          if [[ -n "${PROBE_MAX_UPDATES}" ]]; then
            PROBE_CMD+=(--max-updates "${PROBE_MAX_UPDATES}")
          fi

          STDOUT_JSON="$(mktemp)"
          "${PROBE_CMD[@]}" > "${STDOUT_JSON}"
          PROBE_RUN_ID="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("probe_run_id",""))' "${STDOUT_JSON}")"
          if [[ -z "${PROBE_RUN_ID}" ]]; then
            echo "::error::material-hunter-stream-acceptance-probe did not emit probe_run_id"
            cat "${STDOUT_JSON}"
            exit 1
          fi
          PROBE_DIR="${PROBE_PARENT}/${PROBE_RUN_ID}"
          cp "${STDOUT_JSON}" "${PROBE_DIR}/stream_acceptance_probe_stdout.json"
          printf '%s\n' "${PROBE_RUN_ID}" > "${PROBE_PARENT}/latest_stream_probe_run_id"

          for required in stream_acceptance_probe_summary.json stream_acceptance_probe_liveness.csv stream_acceptance_probe_exit_status.json stream_acceptance_probe_stage_results.json; do
            if [[ ! -f "${PROBE_DIR}/${required}" ]]; then
              echo "::error::material-hunter-stream-acceptance-probe missing required artifact ${required}"
              exit 1
            fi
          done

          python3 - "${PROBE_DIR}" "${DEPLOYED_COMMIT}" <<'PY'
          import json, sys
          from pathlib import Path
          probe_dir = Path(sys.argv[1])
          deployed_commit = sys.argv[2]
          summary = json.loads((probe_dir / "stream_acceptance_probe_summary.json").read_text(encoding="utf-8"))
          exit_status = json.loads((probe_dir / "stream_acceptance_probe_exit_status.json").read_text(encoding="utf-8"))
          liveness = probe_dir / "stream_acceptance_probe_liveness.csv"
          blockers = []
          if not liveness.exists() or liveness.stat().st_size == 0:
              blockers.append("missing_or_empty_liveness")
          if summary.get("acceptance_result") not in {"PASS", "BLOCK"}:
              blockers.append("invalid_acceptance_result")
          if exit_status.get("acceptance_result") != summary.get("acceptance_result"):
              blockers.append("exit_status_summary_mismatch")
          if summary.get("off_vps_candidate_replay_allowed") is not False:
              blockers.append("probe_replay_allowed")
          if summary.get("formal_backtesting_allowed") is not False:
              blockers.append("probe_backtesting_allowed")
          if summary.get("threshold_tuning_allowed") is not False:
              blockers.append("probe_threshold_tuning_allowed")
          if summary.get("identical_subscription_requests") is not True:
              blockers.append("subscription_mismatch")
          result = {
              "schema_version": "phase107.stream_acceptance_probe_workflow_summary.v1",
              "probe_run_id": summary.get("probe_run_id"),
              "deployed_commit": deployed_commit,
              "acceptance_result": summary.get("acceptance_result"),
              "blocker_reason": summary.get("blocker_reason"),
              "root_cause_classification": summary.get("root_cause_classification"),
              "subscription_fingerprint": summary.get("subscription_fingerprint"),
              "identical_subscription_requests": summary.get("identical_subscription_requests"),
              "stage_a_result": summary.get("stage_a_result"),
              "stage_b_result": summary.get("stage_b_result"),
              "stage_c_result": summary.get("stage_c_result"),
              "workflow_artifact_blockers": blockers,
              "material_hunter_started": False,
              "latest_run_id_modified": False,
          }
          (probe_dir / "stream_acceptance_probe_workflow_summary.json").write_text(json.dumps(result, indent=2) + "\n", encoding="utf-8")
          print(json.dumps(result, indent=2))
          if blockers:
              raise SystemExit(1)
          PY
          EOF

