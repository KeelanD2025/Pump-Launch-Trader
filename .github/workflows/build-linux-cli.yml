            echo "## edge mode"
            "${BIN}" validate-edge-mode "${VALIDATE_CONFIG[@]}" || true
          } > "${OUT_DIR}/live_risk_precheck.md"

          if [[ -f "${LOCK_PATH}" ]]; then
            export LOCK_PATH
            python3 - <<'PY' > "${OUT_DIR}/live_risk_precheck_lock.json"
          import json, os
          from pathlib import Path
          lock = json.loads(Path(os.environ["LOCK_PATH"]).read_text(encoding="utf-8"))
          print(json.dumps(lock, indent=2))
          PY
            LOCK_PID="$(python3 -c 'import json, os; from pathlib import Path; print(json.loads(Path(os.environ["LOCK_PATH"]).read_text(encoding="utf-8")).get("pid", ""))')"
            if [[ -n "${LOCK_PID}" ]] && ps -p "${LOCK_PID}" >/dev/null 2>&1; then
              ps -fp "${LOCK_PID}" > "${OUT_DIR}/live_risk_precheck_lock_process.txt" || true
              echo "::error::Autopilot lock has active PID; refusing to overlap live risk canary"
              exit 1
            fi
            echo "::error::Autopilot lock exists but PID is not active; refusing to clear blindly"
            exit 1
          fi

          "${BIN}" live-risk-canary \
            --config "${APP_DIR}/config/default.toml" \
            --config-override "${APP_DIR}/config/local.toml" \
            --env-file "${ENV_FILE}" \
            --duration-seconds "${CANARY_DURATION_SECONDS}" \
            --no-live-trading \
            --no-rpc \
            --upload-r2 \
            --verify-r2 \
            --output-dir "${OUT_DIR}"
          EOF

      - name: Download Phase 100 risk canary reports from VPS
        if: ${{ always() && github.event.inputs.run_risk_canary == 'true' }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          LOCAL_RISK_DIR="phase100-live-risk-canary"
          rm -rf "${LOCAL_RISK_DIR}"
          mkdir -p "${LOCAL_RISK_DIR}"
          ssh -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            APP_DIR="${APP_DIR}" 'bash -se' <<'EOF' | tar -xzf - -C "${LOCAL_RISK_DIR}"
          set -euo pipefail
          REPORT_DIR="${APP_DIR}/data/reports/phase100_live_risk_canary"
          if [[ ! -d "${REPORT_DIR}" ]]; then
            echo "phase100 live risk canary report directory not found: ${REPORT_DIR}" >&2
            exit 1
          fi
          tar -czf - -C "${REPORT_DIR}" .
          EOF

      - name: Upload Phase 100 risk canary reports
        if: ${{ always() && github.event.inputs.run_risk_canary == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: phase100-live-risk-canary
          path: phase100-live-risk-canary
          if-no-files-found: error

      - name: Run Phase 107B material candidate hunter on VPS
        if: ${{ github.event.inputs.run_material_hunter == 'true' || github.event.inputs.run_material_candidate_hunter_slice == 'true' }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          HUNTER_DURATION_SECONDS: ${{ github.event.inputs.material_hunter_duration_seconds }}
          HUNTER_MAX_ATTEMPTS: ${{ github.event.inputs.material_hunter_max_attempted_launches }}
          HUNTER_TARGET_CANDIDATES: ${{ github.event.inputs.material_hunter_target_candidates }}
          RUN_MATERIAL_HUNTER_SLICE: ${{ github.event.inputs.run_material_candidate_hunter_slice }}
        run: |
          set -euo pipefail
          echo "::error::Foreground material-candidate hunter execution is disabled by Phase 107F-B. Use start/status/stop/collect service mode with material-hunter-watchdog."
          exit 1
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          HUNTER_DURATION_SECONDS="${HUNTER_DURATION_SECONDS:-5400}"
          HUNTER_MAX_ATTEMPTS="${HUNTER_MAX_ATTEMPTS:-15}"
          HUNTER_TARGET_CANDIDATES="${HUNTER_TARGET_CANDIDATES:-2}"
          if [[ "${RUN_MATERIAL_HUNTER_SLICE:-false}" == "true" && "${HUNTER_DURATION_SECONDS}" -gt 5400 ]]; then
            echo "::warning::Clamping material hunter slice duration from ${HUNTER_DURATION_SECONDS}s to 5400s"
            HUNTER_DURATION_SECONDS=5400
          fi
          # GitHub-hosted jobs are capped near 6h. Keep the synchronous SSH
          # hunter comfortably below that ceiling so final artifacts can be
          # uploaded instead of losing countability to workflow cancellation.
          if [[ "${HUNTER_DURATION_SECONDS}" -gt 19800 ]]; then
            echo "::warning::Clamping material hunter duration from ${HUNTER_DURATION_SECONDS}s to 19800s for GitHub job timeout budget"
            HUNTER_DURATION_SECONDS=19800
          fi

          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=1200 \
            -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            APP_DIR="${APP_DIR}" HUNTER_DURATION_SECONDS="${HUNTER_DURATION_SECONDS}" HUNTER_MAX_ATTEMPTS="${HUNTER_MAX_ATTEMPTS}" HUNTER_TARGET_CANDIDATES="${HUNTER_TARGET_CANDIDATES}" 'bash -se' <<'EOF'
          set -euo pipefail
          APP_DIR="${APP_DIR}"
          HUNTER_DURATION_SECONDS="${HUNTER_DURATION_SECONDS:-5400}"
          HUNTER_MAX_ATTEMPTS="${HUNTER_MAX_ATTEMPTS:-15}"
          HUNTER_TARGET_CANDIDATES="${HUNTER_TARGET_CANDIDATES:-2}"
          BIN="${APP_DIR}/target/release/cli"
          VALIDATE_CONFIG=(--config "${APP_DIR}/config/default.toml" --config-override "${APP_DIR}/config/local.toml")
          ENV_FILE="/home/ubuntu/pump-launch-quant.env"
          OUT_DIR="${APP_DIR}/data/reports/phase107b_material_candidate_hunter"
          LOCK_PATH="${APP_DIR}/data/autopilot/autopilot.lock"

          if [[ -f "${ENV_FILE}" ]]; then
            set -a
            source "${ENV_FILE}"
            set +a
          else
            echo "::error::VPS env file not found at ${ENV_FILE}"
            exit 1
          fi

          rm -rf "${OUT_DIR}"
          mkdir -p "${OUT_DIR}"
          {
            echo "# Phase 107B Material Candidate Hunter Precheck"
            echo
            echo "## systemd timer"
            systemctl status pump-launch-quant-edge-once.timer --no-pager || true
            echo
            echo "## systemd service"
            systemctl status pump-launch-quant-edge-once.service --no-pager || true
            echo
            echo "## autopilot-status"
            "${BIN}" autopilot-status "${VALIDATE_CONFIG[@]}" || true
            echo
            echo "## disk-preflight"
            "${BIN}" disk-preflight "${VALIDATE_CONFIG[@]}" || true
            echo
            echo "## edge-only footprint"
            "${BIN}" validate-vps-edge-only-footprint "${VALIDATE_CONFIG[@]}" || true
            echo
            echo "## stream-only"
            "${BIN}" validate-stream-only "${VALIDATE_CONFIG[@]}" || true
            echo
            echo "## edge mode"
            "${BIN}" validate-edge-mode "${VALIDATE_CONFIG[@]}" || true
          } > "${OUT_DIR}/workflow_preflight.md"

          "${BIN}" disk-preflight "${VALIDATE_CONFIG[@]}" > "${OUT_DIR}/safety_disk_preflight.json" || true
          "${BIN}" validate-vps-edge-only-footprint "${VALIDATE_CONFIG[@]}" > "${OUT_DIR}/safety_edge_footprint.json" || true
          "${BIN}" validate-stream-only "${VALIDATE_CONFIG[@]}" > "${OUT_DIR}/safety_stream_only.json" || true
          "${BIN}" validate-edge-mode "${VALIDATE_CONFIG[@]}" > "${OUT_DIR}/safety_edge_mode.json" || true

          OUT_DIR="${OUT_DIR}" python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          out_dir = Path(os.environ["OUT_DIR"])
          disk = json.loads((out_dir / "safety_disk_preflight.json").read_text(encoding="utf-8"))
          footprint = json.loads((out_dir / "safety_edge_footprint.json").read_text(encoding="utf-8"))
          stream_only = json.loads((out_dir / "safety_stream_only.json").read_text(encoding="utf-8"))
          edge_mode = json.loads((out_dir / "safety_edge_mode.json").read_text(encoding="utf-8"))

          disk_summary = disk.get("summary", {})
          failures = []
          if disk_summary.get("critical") or disk_summary.get("emergency") or disk_summary.get("pre_cycle_blocked"):
              failures.append(
                  "disk_preflight_failed:"
                  f" free_mb={disk_summary.get('free_mb')}"
                  f" pre_cycle_blocked={disk_summary.get('pre_cycle_blocked')}"
              )
          if footprint.get("passed") is not True:
              failures.append("edge_only_footprint_failed")
          if stream_only.get("passed") is not True:
              failures.append("stream_only_validation_failed")
          if edge_mode.get("passed") is not True:
              failures.append("edge_mode_validation_failed")

          result = {
              "phase": "phase107b",
              "safety_preflight_passed": not failures,
              "failures": failures,
              "disk_free_mb": disk_summary.get("free_mb"),
              "disk_pre_cycle_blocked": disk_summary.get("pre_cycle_blocked"),
              "edge_only_footprint_passed": footprint.get("passed"),
              "stream_only_passed": stream_only.get("passed"),
              "edge_mode_passed": edge_mode.get("passed"),
          }
          (out_dir / "safety_preflight_gate.json").write_text(
              json.dumps(result, indent=2) + "\n",
              encoding="utf-8",
          )
          if failures:
              print("::error::Phase 107B safety preflight failed: " + "; ".join(failures))
              sys.exit(1)
          PY

          if [[ -f "${LOCK_PATH}" ]]; then
            export LOCK_PATH
            python3 - <<'PY' > "${OUT_DIR}/workflow_preflight_lock.json"
          import json, os
          from pathlib import Path
          lock = json.loads(Path(os.environ["LOCK_PATH"]).read_text(encoding="utf-8"))
          print(json.dumps(lock, indent=2))
          PY
            LOCK_PID="$(python3 -c 'import json, os; from pathlib import Path; print(json.loads(Path(os.environ["LOCK_PATH"]).read_text(encoding="utf-8")).get("pid", ""))')"
            if [[ -n "${LOCK_PID}" ]] && ps -p "${LOCK_PID}" >/dev/null 2>&1; then
              ps -fp "${LOCK_PID}" > "${OUT_DIR}/workflow_preflight_lock_process.txt" || true
              echo "::error::Autopilot lock has active PID; refusing to overlap material hunter"
              exit 1
            fi
            echo "::error::Autopilot lock exists but PID is not active; refusing to clear blindly"
            exit 1
          fi

          TELEMETRY_CSV="${OUT_DIR}/resource_telemetry.csv"
          printf 'timestamp,tracked_mints_count,attempted_launches_so_far,rejected_count_so_far,candidate_count_so_far,process_rss_mb,process_vsz_mb,local_artifact_bytes,active_state_objects,retained_transaction_fingerprint_count,retained_events_count,free_mb,any_oom_kernel_kill_evidence\n' > "${TELEMETRY_CSV}"

          set +e
          "${BIN}" material-candidate-hunter \
            --config "${APP_DIR}/config/default.toml" \
            --config-override "${APP_DIR}/config/local.toml" \
            --env-file "${ENV_FILE}" \
            --duration-seconds "${HUNTER_DURATION_SECONDS}" \
            --max-attempted-launches "${HUNTER_MAX_ATTEMPTS}" \
            --target-material-candidates "${HUNTER_TARGET_CANDIDATES}" \
            --max-concurrent-tracked-mints 3 \
            --no-live-trading \
            --no-rpc \
            --upload-r2 \
            --verify-r2 \
            --run-id "material-candidate-hunter-$(date +%s%N)" \
            --output-dir "${OUT_DIR}" &
          HUNTER_PID="$!"
          while kill -0 "${HUNTER_PID}" >/dev/null 2>&1; do
            TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            RSS_KB="$(ps -o rss= -p "${HUNTER_PID}" 2>/dev/null | awk '{print $1}')"
            VSZ_KB="$(ps -o vsz= -p "${HUNTER_PID}" 2>/dev/null | awk '{print $1}')"
            RSS_MB="$(awk -v kb="${RSS_KB:-0}" 'BEGIN { printf "%.2f", kb / 1024 }')"
            VSZ_MB="$(awk -v kb="${VSZ_KB:-0}" 'BEGIN { printf "%.2f", kb / 1024 }')"
            FREE_MB="$(df -Pm "${APP_DIR}" | awk 'NR==2 {print $4}')"
            ART_BYTES="$(du -sb "${OUT_DIR}" 2>/dev/null | awk '{print $1}')"
            ATTEMPTS="$(python3 - "${OUT_DIR}/attempt_ledger.csv" <<'PY'
          import sys
          from pathlib import Path
          p = Path(sys.argv[1])
          print(max(0, sum(1 for _ in p.open()) - 1) if p.exists() else "")
          PY
          )"
            REJECTED="$(python3 - "${OUT_DIR}/rejected_summary.csv" <<'PY'
          import sys
          from pathlib import Path
          p = Path(sys.argv[1])
          print(max(0, sum(1 for _ in p.open()) - 1) if p.exists() else "")
          PY
          )"
            CANDIDATES="$(python3 - "${OUT_DIR}/candidate_summary.csv" <<'PY'
          import sys
          from pathlib import Path
          p = Path(sys.argv[1])
          print(max(0, sum(1 for _ in p.open()) - 1) if p.exists() else "")
          PY
          )"
            OOM_EVIDENCE="$(dmesg -T 2>/dev/null | tail -n 80 | grep -Eic 'out of memory|oom-kill|Killed process' || true)"
            printf '%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s\n' \
              "${TS}" "" "${ATTEMPTS}" "${REJECTED}" "${CANDIDATES}" "${RSS_MB}" "${VSZ_MB}" "${ART_BYTES:-0}" "" "" "" "${FREE_MB:-}" "${OOM_EVIDENCE}" >> "${TELEMETRY_CSV}"
            sleep 30
          done
          wait "${HUNTER_PID}"
          HUNTER_EXIT="$?"
          set -e

          python3 - "${OUT_DIR}" "${HUNTER_EXIT}" <<'PY'
          import csv, json, sys
          from pathlib import Path
          out = Path(sys.argv[1])
          exit_code = int(sys.argv[2])
          csv_path = out / "resource_telemetry.csv"
          rows = list(csv.DictReader(csv_path.open(encoding="utf-8"))) if csv_path.exists() else []
          def floats(name):
              vals = []
              for row in rows:
                  try:
                      vals.append(float(row.get(name) or 0))
                  except ValueError:
                      pass
              return vals
          rss = floats("process_rss_mb")
          vsz = floats("process_vsz_mb")
          free = floats("free_mb")
          oom = any((row.get("any_oom_kernel_kill_evidence") or "0") not in ("", "0") for row in rows)
          summary = {
              "schema_version": "phase107b.resource_telemetry.v1",
              "sample_count": len(rows),
              "process_exit_code": exit_code,
              "killed_by_oom_or_signal": exit_code in (137, 143) or oom,
              "max_process_rss_mb": max(rss) if rss else None,
              "max_process_vsz_mb": max(vsz) if vsz else None,
              "min_free_mb": min(free) if free else None,
              "max_local_artifact_bytes": max([int(row.get("local_artifact_bytes") or 0) for row in rows], default=0),
              "resource_ceiling_exceeded": exit_code in (137, 143) or oom,
              "threshold_tuning_allowed": False,
          }
          (out / "resource_telemetry.json").write_text(json.dumps(summary, indent=2) + "\n", encoding="utf-8")
          (out / "resource_telemetry.md").write_text(
              "# Phase 107B Resource Telemetry\n\n"
              f"- samples: `{summary['sample_count']}`\n"
              f"- process_exit_code: `{summary['process_exit_code']}`\n"
              f"- killed_by_oom_or_signal: `{summary['killed_by_oom_or_signal']}`\n"
              f"- max RSS MB: `{summary['max_process_rss_mb']}`\n"
              f"- min free MB: `{summary['min_free_mb']}`\n"
              f"- resource_ceiling_exceeded: `{summary['resource_ceiling_exceeded']}`\n",
              encoding="utf-8",
          )
          PY

          if [[ "${HUNTER_EXIT}" -eq 0 ]]; then
            HUNTER_RUN_ID="$(python3 - "${OUT_DIR}" <<'PY'
          import json, sys
          from pathlib import Path
          p = Path(sys.argv[1]) / "hunter_summary.json"
          print(json.loads(p.read_text()).get("run_id", "unknown") if p.exists() else "unknown")
          PY
          )"
            "${BIN}" upload-phase-report-dir-r2 \
              --config "${APP_DIR}/config/default.toml" \
              --config-override "${APP_DIR}/config/local.toml" \
              --env-file "${ENV_FILE}" \
              --phase-prefix phase107b_material_candidate_hunter \
              --run-or-mint "${HUNTER_RUN_ID}" \
              --local-output-dir "${OUT_DIR}" \
              --verify
          fi
          exit "${HUNTER_EXIT}"
          EOF

      - name: Start Phase 107E material hunter service on VPS
        if: ${{ github.event.inputs.start_material_candidate_hunter_service == 'true' }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          HUNTER_DURATION_SECONDS: ${{ github.event.inputs.material_hunter_duration_seconds }}
          HUNTER_MAX_ATTEMPTS: ${{ github.event.inputs.material_hunter_max_attempted_launches }}
          HUNTER_TARGET_CANDIDATES: ${{ github.event.inputs.material_hunter_target_candidates }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          HUNTER_DURATION_SECONDS="${HUNTER_DURATION_SECONDS:-5400}"
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 \
            -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            APP_DIR="${APP_DIR}" HUNTER_DURATION_SECONDS="${HUNTER_DURATION_SECONDS}" HUNTER_MAX_ATTEMPTS="${HUNTER_MAX_ATTEMPTS}" HUNTER_TARGET_CANDIDATES="${HUNTER_TARGET_CANDIDATES}" 'bash -se' <<'EOF'
          set -euo pipefail
          APP_DIR="${APP_DIR}"
          BIN="${APP_DIR}/target/release/cli"
          ENV_FILE="/home/ubuntu/pump-launch-quant.env"
          cd "${APP_DIR}"
          RUN_ID="material-candidate-hunter-$(date +%s%N)"
          REQUESTED_HUNTER_DURATION_SECONDS="${HUNTER_DURATION_SECONDS:-5400}"
          REQUESTED_HUNTER_MAX_ATTEMPTS="${HUNTER_MAX_ATTEMPTS:-15}"
          REQUESTED_HUNTER_TARGET_CANDIDATES="${HUNTER_TARGET_CANDIDATES:-2}"
          HUNTER_DURATION_SECONDS="${REQUESTED_HUNTER_DURATION_SECONDS}"
          HUNTER_MAX_ATTEMPTS="${REQUESTED_HUNTER_MAX_ATTEMPTS}"
          HUNTER_TARGET_CANDIDATES="${REQUESTED_HUNTER_TARGET_CANDIDATES}"
          if [[ "${HUNTER_DURATION_SECONDS}" -gt 5400 ]]; then HUNTER_DURATION_SECONDS=5400; fi
          if [[ "${HUNTER_MAX_ATTEMPTS}" -gt 15 ]]; then HUNTER_MAX_ATTEMPTS=15; fi
          if [[ "${HUNTER_TARGET_CANDIDATES}" -gt 2 ]]; then HUNTER_TARGET_CANDIDATES=2; fi
          SERVICE_RUNTIME_MAX_SEC="$((HUNTER_DURATION_SECONDS + 300))"
          UNIT="pump-launch-quant-material-hunter-${RUN_ID}.service"
          OUT_DIR="${APP_DIR}/data/reports/phase107b_material_candidate_hunter/${RUN_ID}"
          LATEST_FILE="${APP_DIR}/data/reports/phase107b_material_candidate_hunter/latest_run_id"
          mkdir -p "${OUT_DIR}"

          if sudo systemctl list-units --type=service --state=running 'pump-launch-quant-material-hunter-*.service' --no-legend | grep -q .; then
            echo "::error::A material hunter service is already active; refusing overlap"
            exit 1
          fi

          cat > "${OUT_DIR}/hunter_service_wrapper.sh" <<'EOS'
          #!/usr/bin/env bash
          set -euo pipefail
          APP_DIR="${APP_DIR}"
          BIN="${BIN}"
          ENV_FILE="${ENV_FILE}"
          OUT_DIR="${OUT_DIR}"
          RUN_ID="${RUN_ID}"
          HUNTER_DURATION_SECONDS="${HUNTER_DURATION_SECONDS}"
          HUNTER_MAX_ATTEMPTS="${HUNTER_MAX_ATTEMPTS}"
          HUNTER_TARGET_CANDIDATES="${HUNTER_TARGET_CANDIDATES}"
          mkdir -p "${OUT_DIR}"
          exec >> "${OUT_DIR}/service.log" 2>&1
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) starting material hunter service wrapper for ${RUN_ID}"
          set -a
          source "${ENV_FILE}"
          set +a
          printf 'timestamp,process_rss_mb,process_vsz_mb,local_artifact_bytes,free_mb,any_oom_kernel_kill_evidence\n' > "${OUT_DIR}/resource_telemetry.csv"
          write_service_exit_status() {
            local status="$1"
            local reason="$2"
            local finalization_written="$3"
            python3 - "${OUT_DIR}" "${RUN_ID}" "${status}" "${reason}" "${finalization_written}" <<'PY'
          import json, sys
          from pathlib import Path
          from datetime import datetime, timezone
          out=Path(sys.argv[1]); run_id=sys.argv[2]; status=int(sys.argv[3]); reason=sys.argv[4]
          finalization_written=sys.argv[5].lower()=="true"
          payload={
            "schema_version":"phase107e.service_exit_status.v1",
            "run_id":run_id,
            "hunter_exit_status":status,
            "service_exit_reason":reason,
            "finalization_written_by_wrapper":finalization_written,
            "countability_decision_exists":(out/"countability_decision.json").exists(),
            "hunter_summary_exists":(out/"hunter_summary.json").exists(),
            "hunter_summary_interrupted_exists":(out/"hunter_summary_interrupted.json").exists(),
            "threshold_tuning_allowed":False,
            "generated_at":datetime.now(timezone.utc).isoformat().replace("+00:00","Z"),
          }
          (out/"service_exit_status.json").write_text(json.dumps(payload,indent=2)+"\n")
          (out/"service_exit_status.md").write_text(
              "# Phase 107E Service Exit Status\n\n"
              f"- run_id: `{run_id}`\n"
              f"- hunter_exit_status: `{status}`\n"
              f"- service_exit_reason: `{reason}`\n"
              f"- finalization_written_by_wrapper: `{str(finalization_written).lower()}`\n"
          )
          PY
          }
          finalize_interrupted() {
            local reason="$1"
            python3 - "${OUT_DIR}" "${RUN_ID}" "${reason}" <<'PY'
          import json, sys
          from pathlib import Path
          from datetime import datetime, timezone
          out=Path(sys.argv[1]); run_id=sys.argv[2]; reason=sys.argv[3]
          summary={
            "schema_version":"phase107e.hunter_summary_interrupted.v1",
            "run_id":run_id,
            "interruption_reason":reason,
            "counted_phase107b_result":False,
            "partial_outputs_audit_only":True,
            "off_vps_candidate_replay_allowed":False,
            "holder_rpc_used":False,
            "rpc_mint_supply_canonical":False,
            "threshold_tuning_allowed":False,
            "generated_at":datetime.now(timezone.utc).isoformat().replace("+00:00","Z"),
          }
          (out/"hunter_summary_interrupted.json").write_text(json.dumps(summary,indent=2)+"\n")
          (out/"hunter_summary_interrupted.md").write_text("# Phase 107E Interrupted Hunter\n\n- run_id: `"+run_id+"`\n- interruption_reason: `"+reason+"`\n- counted_phase107b_result: `false`\n")
          (out/"countability_decision.json").write_text(json.dumps(summary,indent=2)+"\n")
          PY
            "${BIN}" upload-phase-report-dir-r2 --config "${APP_DIR}/config/default.toml" --config-override "${APP_DIR}/config/local.toml" --env-file "${ENV_FILE}" --phase-prefix phase107b_material_candidate_hunter --run-or-mint "${RUN_ID}" --local-output-dir "${OUT_DIR}" --verify || true
          }
          ensure_finalization_or_write_interrupted() {
            local reason="$1"
            if [[ ! -f "${OUT_DIR}/countability_decision.json" && ! -f "${OUT_DIR}/hunter_summary_interrupted.json" && ! -f "${OUT_DIR}/hunter_summary.json" ]]; then
              finalize_interrupted "${reason}"
              return 0
            fi
            "${BIN}" upload-phase-report-dir-r2 --config "${APP_DIR}/config/default.toml" --config-override "${APP_DIR}/config/local.toml" --env-file "${ENV_FILE}" --phase-prefix phase107b_material_candidate_hunter --run-or-mint "${RUN_ID}" --local-output-dir "${OUT_DIR}" --verify || true
            return 1
          }
          handle_signal() {
            local reason="$1"
            local code="$2"
            trap - TERM INT HUP
            finalize_interrupted "${reason}"
            if [[ -n "${HUNTER_PID:-}" ]] && kill -0 "${HUNTER_PID}" >/dev/null 2>&1; then
              kill -INT "${HUNTER_PID}" >/dev/null 2>&1 || true
              for _ in $(seq 1 12); do
                if ! kill -0 "${HUNTER_PID}" >/dev/null 2>&1; then
                  break
                fi
                sleep 5
              done
              if kill -0 "${HUNTER_PID}" >/dev/null 2>&1; then
                kill -TERM "${HUNTER_PID}" >/dev/null 2>&1 || true
                sleep 5
              fi
              if kill -0 "${HUNTER_PID}" >/dev/null 2>&1; then
                kill -KILL "${HUNTER_PID}" >/dev/null 2>&1 || true
              fi
              wait "${HUNTER_PID}" >/dev/null 2>&1 || true
            fi
            if [[ -n "${HEARTBEAT_PID:-}" ]] && kill -0 "${HEARTBEAT_PID}" >/dev/null 2>&1; then
              kill "${HEARTBEAT_PID}" >/dev/null 2>&1 || true
            fi
            write_service_exit_status "${code}" "${reason}" "true"
            exit "${code}"
          }
          trap 'handle_signal sigterm 143' TERM
          trap 'handle_signal sigint 130' INT
          trap 'handle_signal sighup 129' HUP
          heartbeat_loop() {
            while true; do
              TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              FREE_MB="$(df -Pm "${APP_DIR}" | awk 'NR==2 {print $4}')"
              ART_BYTES="$(du -sb "${OUT_DIR}" 2>/dev/null | awk '{print $1}')"
              printf '{"schema_version":"phase107e.progress_heartbeat.v1","run_id":"%s","timestamp":"%s","free_mb":%s,"local_artifact_bytes":%s,"holder_rpc_used":false,"rpc_mint_supply_canonical":false,"threshold_tuning_allowed":false}\n' "${RUN_ID}" "${TS}" "${FREE_MB:-0}" "${ART_BYTES:-0}" > "${OUT_DIR}/progress_heartbeat.json"
              printf '# Phase 107E Hunter Heartbeat\n\n- run_id: `%s`\n- timestamp: `%s`\n- free_mb: `%s`\n' "${RUN_ID}" "${TS}" "${FREE_MB:-}" > "${OUT_DIR}/progress_heartbeat.md"
              if [[ -n "${HUNTER_PID:-}" ]] && kill -0 "${HUNTER_PID}" >/dev/null 2>&1; then
                RSS_KB="$(ps -o rss= -p "${HUNTER_PID}" 2>/dev/null | awk '{print $1}')"
                VSZ_KB="$(ps -o vsz= -p "${HUNTER_PID}" 2>/dev/null | awk '{print $1}')"
                RSS_MB="$(awk -v kb="${RSS_KB:-0}" 'BEGIN { printf "%.2f", kb / 1024 }')"
                VSZ_MB="$(awk -v kb="${VSZ_KB:-0}" 'BEGIN { printf "%.2f", kb / 1024 }')"
                OOM="$(dmesg -T 2>/dev/null | tail -n 80 | grep -Eic 'out of memory|oom-kill|Killed process' || true)"
                printf '%s,%s,%s,%s,%s,%s\n' "${TS}" "${RSS_MB}" "${VSZ_MB}" "${ART_BYTES:-0}" "${FREE_MB:-}" "${OOM}" >> "${OUT_DIR}/resource_telemetry.csv"
              fi
              sleep 30
            done
          }
          heartbeat_loop &
          HEARTBEAT_PID="$!"
          "${BIN}" material-candidate-hunter --config "${APP_DIR}/config/default.toml" --config-override "${APP_DIR}/config/local.toml" --env-file "${ENV_FILE}" --run-id "${RUN_ID}" --duration-seconds "${HUNTER_DURATION_SECONDS}" --max-attempted-launches "${HUNTER_MAX_ATTEMPTS}" --target-material-candidates "${HUNTER_TARGET_CANDIDATES}" --max-concurrent-tracked-mints 3 --no-live-trading --no-rpc --upload-r2 --verify-r2 --output-dir "${OUT_DIR}" &
          HUNTER_PID="$!"
          set +e
          wait "${HUNTER_PID}"
          STATUS="$?"
          set -e
          kill "${HEARTBEAT_PID}" >/dev/null 2>&1 || true
          if [[ "${STATUS}" -ne 0 ]]; then
            if ensure_finalization_or_write_interrupted "hunter_exit_${STATUS}"; then
              write_service_exit_status "${STATUS}" "hunter_nonzero_exit_missing_finalization" "true"
            else
              write_service_exit_status "${STATUS}" "hunter_nonzero_exit_existing_finalization" "false"
            fi
            exit "${STATUS}"
          fi
          if ensure_finalization_or_write_interrupted "hunter_exit_zero_missing_final_artifacts"; then
            write_service_exit_status "1" "hunter_exit_zero_missing_final_artifacts" "true"
            exit 1
          fi
          write_service_exit_status "${STATUS}" "hunter_exit_with_final_artifacts" "false"
          exit "${STATUS}"
          EOS
          chmod +x "${OUT_DIR}/hunter_service_wrapper.sh"

          cat > "${OUT_DIR}/service_start.json" <<EOS
          {"schema_version":"phase107e.service_start.v1","run_id":"${RUN_ID}","unit":"${UNIT}","output_dir":"${OUT_DIR}","requested_duration_seconds":${REQUESTED_HUNTER_DURATION_SECONDS},"effective_duration_seconds":${HUNTER_DURATION_SECONDS},"requested_max_attempted_launches":${REQUESTED_HUNTER_MAX_ATTEMPTS},"effective_max_attempted_launches":${HUNTER_MAX_ATTEMPTS},"requested_target_candidates":${REQUESTED_HUNTER_TARGET_CANDIDATES},"effective_target_candidates":${HUNTER_TARGET_CANDIDATES},"runtime_max_sec":${SERVICE_RUNTIME_MAX_SEC},"live_trading_enabled":false,"holder_rpc_used":false,"threshold_tuning_allowed":false}
          EOS
          cat > "${OUT_DIR}/service_start.md" <<EOS
          # Phase 107E Service Start

          - run_id: \`${RUN_ID}\`
          - unit: \`${UNIT}\`
          - output_dir: \`${OUT_DIR}\`
          - requested_duration_seconds: \`${REQUESTED_HUNTER_DURATION_SECONDS}\`
          - effective_duration_seconds: \`${HUNTER_DURATION_SECONDS}\`
          - requested_max_attempted_launches: \`${REQUESTED_HUNTER_MAX_ATTEMPTS}\`
          - effective_max_attempted_launches: \`${HUNTER_MAX_ATTEMPTS}\`
          - runtime_max_sec: \`${SERVICE_RUNTIME_MAX_SEC}\`
          EOS

          sudo systemd-run --unit="${UNIT}" \
            --property=WorkingDirectory="${APP_DIR}" \
            --property=KillSignal=SIGINT \
            --property=KillMode=process \
            --property=TimeoutStopSec=120 \
            --property=RuntimeMaxSec="${SERVICE_RUNTIME_MAX_SEC}" \
            --property=Restart=no \
            --setenv=APP_DIR="${APP_DIR}" \
            --setenv=BIN="${BIN}" \
            --setenv=ENV_FILE="${ENV_FILE}" \
            --setenv=OUT_DIR="${OUT_DIR}" \
            --setenv=RUN_ID="${RUN_ID}" \
            --setenv=HUNTER_DURATION_SECONDS="${HUNTER_DURATION_SECONDS}" \
            --setenv=HUNTER_MAX_ATTEMPTS="${HUNTER_MAX_ATTEMPTS}" \
            --setenv=HUNTER_TARGET_CANDIDATES="${HUNTER_TARGET_CANDIDATES}" \
            "${OUT_DIR}/hunter_service_wrapper.sh"
          sleep 3
          sudo systemctl is-active "${UNIT}"
          for _ in $(seq 1 120); do
            if [[ -f "${OUT_DIR}/health/heartbeat.json" && -f "${OUT_DIR}/attempt_ledger.csv" ]]; then
              break
            fi
            sleep 1
          done
          if [[ ! -f "${OUT_DIR}/health/heartbeat.json" || ! -f "${OUT_DIR}/attempt_ledger.csv" ]]; then
            echo "::error::Material hunter failed startup sentinel: missing health heartbeat or attempt ledger"
            exit 1
          fi
          sudo -E "${BIN}" material-hunter-watchdog --run-id "${RUN_ID}" --output-dir "${APP_DIR}/data/reports/phase107b_material_candidate_hunter" --fail-fast-check --json
          for _ in $(seq 1 300); do
            if [[ -f "${OUT_DIR}/health/last_checkpoint.json" ]] && python3 - "${OUT_DIR}/health/last_checkpoint.json" <<'PY'
          import json, sys
          from pathlib import Path
          data = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          raise SystemExit(0 if data.get("r2_checkpoint_verified") is True else 1)
          PY
            then
              break
            fi
            sleep 1
          done
          if [[ ! -f "${OUT_DIR}/health/last_checkpoint.json" ]]; then
            echo "::error::Material hunter startup R2 checkpoint did not appear within 300s"
            exit 1
          fi
          python3 - "${OUT_DIR}/health/last_checkpoint.json" <<'PY'
          import json, sys
          from pathlib import Path
          data = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          if data.get("r2_checkpoint_verified") is not True:
              print("::error::Material hunter startup R2 checkpoint was not verified")
              raise SystemExit(1)
          PY
          printf '%s\n' "${RUN_ID}" > "${LATEST_FILE}"
          echo "${RUN_ID}"
          EOF

      - name: Check Phase 107E material hunter service status
        if: ${{ github.event.inputs.check_material_candidate_hunter_status == 'true' }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          MATERIAL_HUNTER_RUN_ID: ${{ github.event.inputs.material_hunter_run_id }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          ssh -p "${PORT}" "${VPS_USER}@${VPS_HOST}" APP_DIR="${APP_DIR}" MATERIAL_HUNTER_RUN_ID="${MATERIAL_HUNTER_RUN_ID}" 'bash -se' <<'EOF'
          set -euo pipefail
          cd "${APP_DIR}"
          RUN_ID="${MATERIAL_HUNTER_RUN_ID}"
          if [[ -z "${RUN_ID}" && -f "${APP_DIR}/data/reports/phase107b_material_candidate_hunter/latest_run_id" ]]; then
            RUN_ID="$(cat "${APP_DIR}/data/reports/phase107b_material_candidate_hunter/latest_run_id")"
          fi
          UNIT="pump-launch-quant-material-hunter-${RUN_ID}.service"
          OUT_DIR="${APP_DIR}/data/reports/phase107b_material_candidate_hunter/${RUN_ID}"
          sudo systemctl status "${UNIT}" --no-pager || true
          sudo -E "${APP_DIR}/target/release/cli" material-hunter-watchdog --run-id "${RUN_ID}" --output-dir "${APP_DIR}/data/reports/phase107b_material_candidate_hunter" --status --json || true
          cat "${OUT_DIR}/progress_heartbeat.json" 2>/dev/null || true
          cat "${OUT_DIR}/health/heartbeat.json" 2>/dev/null || true
          EOF

      - name: Stop Phase 107E material hunter service
        if: ${{ github.event.inputs.stop_material_candidate_hunter_service == 'true' }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          MATERIAL_HUNTER_RUN_ID: ${{ github.event.inputs.material_hunter_run_id }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          ssh -p "${PORT}" "${VPS_USER}@${VPS_HOST}" APP_DIR="${APP_DIR}" MATERIAL_HUNTER_RUN_ID="${MATERIAL_HUNTER_RUN_ID}" 'bash -se' <<'EOF'
          set -euo pipefail
          cd "${APP_DIR}"
          RUN_ID="${MATERIAL_HUNTER_RUN_ID}"
          if [[ -z "${RUN_ID}" && -f "${APP_DIR}/data/reports/phase107b_material_candidate_hunter/latest_run_id" ]]; then
            RUN_ID="$(cat "${APP_DIR}/data/reports/phase107b_material_candidate_hunter/latest_run_id")"
          fi
          UNIT="pump-launch-quant-material-hunter-${RUN_ID}.service"
          sudo systemctl kill --kill-whom=main --signal=SIGINT "${UNIT}" || true
          for _ in $(seq 1 24); do
            if ! sudo systemctl is-active --quiet "${UNIT}"; then
              break
            fi
            sleep 5
          done
          if sudo systemctl is-active --quiet "${UNIT}"; then
            echo "::warning::Material hunter service still active after graceful SIGINT; escalating to SIGTERM"
            sudo systemctl kill --kill-whom=all --signal=SIGTERM "${UNIT}" || true
            sleep 10
          fi
          if sudo systemctl is-active --quiet "${UNIT}"; then
            echo "::warning::Material hunter service still active after SIGTERM; escalating to SIGKILL"
            sudo systemctl kill --kill-whom=all --signal=SIGKILL "${UNIT}" || true
            sleep 5
          fi
          OUT_DIR="${APP_DIR}/data/reports/phase107b_material_candidate_hunter/${RUN_ID}"
          if sudo systemctl is-active --quiet "${UNIT}"; then
            echo "::error::Material hunter service remained active after stop escalation"
            sudo systemctl status "${UNIT}" --no-pager || true
            exit 1
          fi
          if [[ ! -f "${OUT_DIR}/countability_decision.json" && ! -f "${OUT_DIR}/hunter_summary_interrupted.json" ]]; then
            echo "::error::Material hunter finalization missing countability_decision.json and hunter_summary_interrupted.json"
            exit 1
          fi
          sudo -E "${APP_DIR}/target/release/cli" material-hunter-watchdog --run-id "${RUN_ID}" --output-dir "${APP_DIR}/data/reports/phase107b_material_candidate_hunter" --status --json || true
          sudo systemctl status "${UNIT}" --no-pager || true
          EOF

      - name: Download Phase 107B material hunter reports from VPS
        if: ${{ always() && (github.event.inputs.run_material_hunter == 'true' || github.event.inputs.start_material_candidate_hunter_service == 'true' || github.event.inputs.check_material_candidate_hunter_status == 'true' || github.event.inputs.stop_material_candidate_hunter_service == 'true' || github.event.inputs.collect_material_candidate_hunter_artifacts == 'true') }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          MATERIAL_HUNTER_RUN_ID: ${{ github.event.inputs.material_hunter_run_id }}
          RUN_MATERIAL_HUNTER: ${{ github.event.inputs.run_material_hunter }}
          SERVICE_MODE: ${{ github.event.inputs.start_material_candidate_hunter_service == 'true' || github.event.inputs.check_material_candidate_hunter_status == 'true' || github.event.inputs.stop_material_candidate_hunter_service == 'true' || github.event.inputs.collect_material_candidate_hunter_artifacts == 'true' }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          LOCAL_HUNTER_DIR="phase107b-material-candidate-hunter"
          rm -rf "${LOCAL_HUNTER_DIR}"
          mkdir -p "${LOCAL_HUNTER_DIR}"
          ssh -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            APP_DIR="${APP_DIR}" MATERIAL_HUNTER_RUN_ID="${MATERIAL_HUNTER_RUN_ID}" RUN_MATERIAL_HUNTER="${RUN_MATERIAL_HUNTER}" SERVICE_MODE="${SERVICE_MODE}" 'bash -se' <<'EOF' | tar -xzf - -C "${LOCAL_HUNTER_DIR}"
          set -euo pipefail
          REPORT_DIR="${APP_DIR}/data/reports/phase107b_material_candidate_hunter"
          if [[ ! -d "${REPORT_DIR}" ]]; then
            echo "phase107b material hunter report directory not found: ${REPORT_DIR}" >&2
            exit 1
          fi
          if [[ "${SERVICE_MODE}" == "true" && "${RUN_MATERIAL_HUNTER}" != "true" ]]; then
            RUN_ID="${MATERIAL_HUNTER_RUN_ID}"
            if [[ -z "${RUN_ID}" && -f "${REPORT_DIR}/latest_run_id" ]]; then
              RUN_ID="$(cat "${REPORT_DIR}/latest_run_id")"
            fi
            if [[ -n "${RUN_ID}" && -d "${REPORT_DIR}/${RUN_ID}" ]]; then
              tmp="$(mktemp -d)"
              mkdir -p "${tmp}/${RUN_ID}"
              cp -a "${REPORT_DIR}/${RUN_ID}/." "${tmp}/${RUN_ID}/"
              if [[ -f "${REPORT_DIR}/latest_run_id" ]]; then
                cp "${REPORT_DIR}/latest_run_id" "${tmp}/latest_run_id"
              fi
              tar -czf - -C "${tmp}" .
              rm -rf "${tmp}"
              exit 0
            fi
          fi
          tar -czf - -C "${REPORT_DIR}" .
          EOF

      - name: Upload Phase 107B material hunter reports
        if: ${{ always() && (github.event.inputs.run_material_hunter == 'true' || github.event.inputs.start_material_candidate_hunter_service == 'true' || github.event.inputs.check_material_candidate_hunter_status == 'true' || github.event.inputs.stop_material_candidate_hunter_service == 'true' || github.event.inputs.collect_material_candidate_hunter_artifacts == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: phase107b-material-candidate-hunter
          path: phase107b-material-candidate-hunter
          if-no-files-found: error

      - name: Download VPS pre-run housekeeping reports
        if: ${{ always() && (github.event.inputs.run_smoke == 'true' || github.event.inputs.run_live_canary == 'true' || github.event.inputs.run_risk_canary == 'true' || github.event.inputs.run_material_hunter == 'true' || github.event.inputs.run_housekeeping_only == 'true') }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          LOCAL_DIR="phase107d-vps-pre-run-housekeeping"
          rm -rf "${LOCAL_DIR}"
          mkdir -p "${LOCAL_DIR}"
          ssh -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            APP_DIR="${APP_DIR}" 'bash -se' <<'EOF' | tar -xzf - -C "${LOCAL_DIR}"
          set -euo pipefail
          REPORT_DIR="${APP_DIR}/data/reports/pre_run_housekeeping/latest"
          if [[ ! -d "${REPORT_DIR}" ]]; then
            mkdir -p /tmp/empty-housekeeping
            tar -czf - -C /tmp/empty-housekeeping .
            exit 0
          fi
          tar -czf - -C "${REPORT_DIR}" .
          EOF

      - name: Upload VPS pre-run housekeeping reports
        if: ${{ always() && (github.event.inputs.run_smoke == 'true' || github.event.inputs.run_live_canary == 'true' || github.event.inputs.run_risk_canary == 'true' || github.event.inputs.run_material_hunter == 'true' || github.event.inputs.run_housekeeping_only == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: phase107d-vps-pre-run-housekeeping
          path: phase107d-vps-pre-run-housekeeping
          if-no-files-found: warn

      - name: Restart edge timer after smoke
        if: ${{ github.event.inputs.restart_timer == 'true' }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          ssh -p "${PORT}" "${VPS_USER}@${VPS_HOST}" 'sudo systemctl start pump-launch-quant-edge-once.timer'

      - name: Write deploy summary
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          {
            echo "## VPS deploy summary"
            echo
            echo "- artifact: cli-linux-${TARGET_TRIPLE}"
            echo "- deploy_to_vps: true"
            echo "- restart_timer_requested: ${{ github.event.inputs.restart_timer }}"
            echo "- run_smoke_requested: ${{ github.event.inputs.run_smoke }}"
            echo "- run_live_canary_requested: ${{ github.event.inputs.run_live_canary }}"
            echo "- run_risk_canary_requested: ${{ github.event.inputs.run_risk_canary }}"
            echo "- run_geyser_diagnostic_requested: ${{ github.event.inputs.run_geyser_diagnostic }}"
            echo "- vps_user: ${VPS_USER}"
            echo "- vps_host: ${VPS_HOST}"
            echo "- vps_app_dir: ${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          } >> "${GITHUB_STEP_SUMMARY}"
