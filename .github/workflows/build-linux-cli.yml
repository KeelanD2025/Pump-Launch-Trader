      - name: Run material hunter stream acceptance probe on VPS
        if: ${{ github.event.inputs.run_material_hunter_stream_acceptance_probe == 'true' }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
