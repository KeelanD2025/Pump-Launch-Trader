name: Build Linux CLI

on:
  workflow_dispatch:
    inputs:
      deploy_to_vps:
        description: Deploy the built CLI binary to the VPS
        required: false
        default: false
        type: boolean
      restart_timer:
        description: Restart the edge timer after a successful deploy
        required: false
        default: false
        type: boolean
      run_smoke:
        description: Run a short edge-only smoke cycle after deploy
        required: false
        default: false
        type: boolean
      run_live_canary:
        description: Run one fresh-launch metric canary after deploy
        required: false
        default: false
        type: boolean
      run_risk_canary:
        description: Run one Phase 100 live risk canary after deploy
        required: false
        default: false
        type: boolean
      run_material_hunter:
        description: Run bounded Phase 107B material-candidate hunter synchronously after deploy
        required: false
        default: false
        type: boolean
      start_material_candidate_hunter_service:
        description: Start VPS-owned Phase 107E material hunter service and exit
        required: false
        default: false
        type: boolean
      check_material_candidate_hunter_status:
        description: Check VPS-owned material hunter service status
        required: false
        default: false
        type: boolean
      stop_material_candidate_hunter_service:
        description: Stop VPS-owned material hunter service gracefully
        required: false
        default: false
        type: boolean
      collect_material_candidate_hunter_artifacts:
        description: Collect current/final VPS material hunter artifacts
        required: false
        default: false
        type: boolean
      run_material_candidate_hunter_slice:
        description: Run a short checkpointed material hunter slice
        required: false
        default: false
        type: boolean
      material_hunter_run_id:
        description: Existing material hunter run id for status/stop/collect
        required: false
        default: ""
        type: string
      run_housekeeping_only:
        description: Run mandatory VPS pre-run housekeeping without starting collection
        required: false
        default: false
        type: boolean
      housekeeping_run_class:
        description: Run class for housekeeping-only proof
        required: false
        default: "material_candidate_hunter"
        type: string
      housekeeping_dry_run:
        description: Run VPS housekeeping in dry-run mode
        required: false
        default: false
        type: boolean
      run_geyser_diagnostic:
        description: Run a short provider stream diagnostic after deploy
        required: false
        default: false
        type: boolean
      smoke_duration_seconds:
        description: Edge-only smoke/canary duration in seconds
        required: false
        default: "120"
        type: string
      material_hunter_duration_seconds:
        description: Phase 107B hunter duration in seconds
        required: false
        default: "28800"
        type: string
      material_hunter_max_attempted_launches:
        description: Material hunter max attempted launches
        required: false
        default: "50"
        type: string
      material_hunter_target_candidates:
        description: Material hunter target material candidates
        required: false
        default: "5"
        type: string

permissions:
  contents: read

env:
  DIST_DIR: dist
  TARGET_TRIPLE: x86_64-unknown-linux-gnu

jobs:
  build-linux-cli:
    name: Build Linux x86_64 CLI
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ env.TARGET_TRIPLE }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.TARGET_TRIPLE }}-
            ${{ runner.os }}-cargo-

      - name: Run test suite
        run: cargo test -q

      - name: Build release CLI
        run: cargo build --release -p cli

      - name: Validate config
        run: target/release/cli validate-config --config config/default.toml --config-override config/local.example.toml

      - name: Validate stream-only
        run: target/release/cli validate-stream-only --config config/default.toml --config-override config/local.example.toml

      - name: Validate edge mode
        run: target/release/cli validate-edge-mode --config config/default.toml --config-override config/local.example.toml

      - name: Scan for secrets
        run: target/release/cli scan-secrets --config config/default.toml

      - name: Package build artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${DIST_DIR}"
          cp target/release/cli "${DIST_DIR}/cli"
          sha256sum "${DIST_DIR}/cli" | awk '{print $1}' > "${DIST_DIR}/cli.sha256"

          PACKAGE_VERSION="$(
            cargo metadata --no-deps --format-version 1 \
              | python3 -c 'import json, sys; data=json.load(sys.stdin); print(next(pkg["version"] for pkg in data["packages"] if pkg["name"] == "cli"))'
          )"
          BINARY_SHA256="$(cat "${DIST_DIR}/cli.sha256")"
          RUSTC_VERSION="$(rustc --version)"
          RUSTC_VERBOSE="$(rustc --version --verbose)"
          BUILD_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          export PACKAGE_VERSION
          export BINARY_SHA256
          export RUSTC_VERSION
          export RUSTC_VERBOSE
          export BUILD_TIMESTAMP

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          info = {
              "git_sha": os.environ["GITHUB_SHA"],
              "build_timestamp": os.environ["BUILD_TIMESTAMP"],
              "rustc_version": os.environ["RUSTC_VERSION"],
              "rustc_verbose": os.environ["RUSTC_VERBOSE"],
              "target_triple": os.environ["TARGET_TRIPLE"],
              "binary_sha256": os.environ["BINARY_SHA256"],
              "package_version": os.environ["PACKAGE_VERSION"],
          }
          Path(os.environ["DIST_DIR"], "build_info.json").write_text(
              json.dumps(info, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload Linux CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux-${{ env.TARGET_TRIPLE }}
          path: |
            dist/cli
            dist/cli.sha256
            dist/build_info.json
          if-no-files-found: error

  deploy-to-vps:
    name: Deploy prebuilt CLI to VPS
    if: ${{ github.event.inputs.deploy_to_vps == 'true' }}
    needs: build-linux-cli
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-linux-${{ env.TARGET_TRIPLE }}
          path: dist

      - name: Verify artifact checksum
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_SHA="$(tr -d '[:space:]' < dist/cli.sha256)"
          ACTUAL_SHA="$(sha256sum dist/cli | awk '{print $1}')"
          test "${EXPECTED_SHA}" = "${ACTUAL_SHA}"

      - name: Load VPS SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host key
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${PORT}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Stage CLI artifact on VPS
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          scp -P "${PORT}" dist/cli "${VPS_USER}@${VPS_HOST}:${APP_DIR}/target/release/cli.new"
          scp -P "${PORT}" dist/cli.sha256 "${VPS_USER}@${VPS_HOST}:${APP_DIR}/target/release/cli.new.sha256"
          scp -P "${PORT}" dist/build_info.json "${VPS_USER}@${VPS_HOST}:${APP_DIR}/target/release/build_info.json.new"
          scp -P "${PORT}" deploy/systemd/pump-launch-quant-edge-once.service "${VPS_USER}@${VPS_HOST}:${APP_DIR}/target/release/pump-launch-quant-edge-once.service.new"

      - name: Install and validate prebuilt CLI on VPS
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          RESTART_TIMER: ${{ github.event.inputs.restart_timer }}
          RUN_SMOKE: ${{ github.event.inputs.run_smoke }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          RESTART_AFTER_DEPLOY="${RESTART_TIMER}"
          if [[ "${RUN_SMOKE}" == "true" ]]; then
            RESTART_AFTER_DEPLOY="false"
          fi

          ssh -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            APP_DIR="${APP_DIR}" RESTART_AFTER_DEPLOY="${RESTART_AFTER_DEPLOY}" 'bash -se' <<'EOF'
          set -euo pipefail

          APP_DIR="${APP_DIR}"
          BIN="${APP_DIR}/target/release/cli"
          NEW_BIN="${APP_DIR}/target/release/cli.new"
          NEW_SHA="${APP_DIR}/target/release/cli.new.sha256"
          NEW_BUILD_INFO="${APP_DIR}/target/release/build_info.json.new"
          NEW_EDGE_SERVICE="${APP_DIR}/target/release/pump-launch-quant-edge-once.service.new"
          BUILD_INFO_TARGET="${APP_DIR}/target/release/build_info.json"
          VALIDATE_CONFIG=(--config "${APP_DIR}/config/default.toml" --config-override "${APP_DIR}/config/local.toml")
          ENV_FILE="/home/ubuntu/pump-launch-quant.env"
          TIMESTAMP="$(date -u +%Y%m%dT%H%M%SZ)"
          BACKUP="${BIN}.prev.${TIMESTAMP}"
          DEPLOYMENT_SUMMARY="${APP_DIR}/target/release/deploy_summary.${TIMESTAMP}.json"

          rollback() {
            if [[ -f "${BACKUP}" ]]; then
              cp "${BACKUP}" "${BIN}"
              chmod +x "${BIN}"
            fi
          }

          on_error() {
            rollback
            exit 1
          }

          trap on_error ERR

          sudo systemctl stop pump-launch-quant-edge-once.timer || true
          sudo systemctl stop pump-launch-quant-edge-once.service || true

          if [[ -f "${BIN}" ]]; then
            cp "${BIN}" "${BACKUP}"
          fi

          EXPECTED_SHA="$(tr -d '[:space:]' < "${NEW_SHA}")"
          ACTUAL_SHA="$(sha256sum "${NEW_BIN}" | awk '{print $1}')"
          test "${EXPECTED_SHA}" = "${ACTUAL_SHA}"

          mv "${NEW_BIN}" "${BIN}"
          chmod +x "${BIN}"

          "${BIN}" validate-config "${VALIDATE_CONFIG[@]}"
          "${BIN}" validate-stream-only "${VALIDATE_CONFIG[@]}"
          "${BIN}" validate-edge-mode "${VALIDATE_CONFIG[@]}"
          "${BIN}" scan-secrets "${VALIDATE_CONFIG[@]}" --env-file "${ENV_FILE}"

          mv "${NEW_BUILD_INFO}" "${BUILD_INFO_TARGET}"
          mv "${NEW_SHA}" "${BIN}.sha256"
          if [[ -f "${NEW_EDGE_SERVICE}" ]]; then
            sudo install -m 0644 "${NEW_EDGE_SERVICE}" /etc/systemd/system/pump-launch-quant-edge-once.service
            rm -f "${NEW_EDGE_SERVICE}"
            sudo systemctl daemon-reload
          fi

          trap - ERR

          if [[ "${RESTART_AFTER_DEPLOY}" == "true" ]]; then
            sudo systemctl start pump-launch-quant-edge-once.timer
          fi

          export APP_DIR BIN BACKUP BUILD_INFO_TARGET DEPLOYMENT_SUMMARY RESTART_AFTER_DEPLOY

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          summary = {
              "app_dir": os.environ["APP_DIR"],
              "binary_path": os.environ["BIN"],
              "backup_path": os.environ["BACKUP"],
              "build_info_path": os.environ["BUILD_INFO_TARGET"],
              "restart_timer_requested": os.environ["RESTART_AFTER_DEPLOY"] == "true",
              "validations_passed": True,
              "smoke_run_executed": False,
          }
          Path(os.environ["DEPLOYMENT_SUMMARY"]).write_text(
              json.dumps(summary, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(summary, indent=2))
          PY
          EOF

      - name: Run mandatory VPS pre-run housekeeping
        if: ${{ github.event.inputs.run_smoke == 'true' || github.event.inputs.run_live_canary == 'true' || github.event.inputs.run_risk_canary == 'true' || github.event.inputs.run_material_hunter == 'true' || github.event.inputs.run_material_candidate_hunter_slice == 'true' || github.event.inputs.start_material_candidate_hunter_service == 'true' || github.event.inputs.run_housekeeping_only == 'true' }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          RUN_SMOKE: ${{ github.event.inputs.run_smoke }}
          RUN_LIVE_CANARY: ${{ github.event.inputs.run_live_canary }}
          RUN_RISK_CANARY: ${{ github.event.inputs.run_risk_canary }}
          RUN_MATERIAL_HUNTER: ${{ github.event.inputs.run_material_hunter }}
          HOUSEKEEPING_RUN_CLASS: ${{ github.event.inputs.housekeeping_run_class }}
          HOUSEKEEPING_DRY_RUN: ${{ github.event.inputs.housekeeping_dry_run }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          RUN_CLASS="${HOUSEKEEPING_RUN_CLASS:-material_candidate_hunter}"
          if [[ "${RUN_MATERIAL_HUNTER}" == "true" ]]; then
            RUN_CLASS="material_candidate_hunter"
          elif [[ "${RUN_RISK_CANARY}" == "true" ]]; then
            RUN_CLASS="risk_canary"
          elif [[ "${RUN_LIVE_CANARY}" == "true" ]]; then
            RUN_CLASS="launch_canary"
          elif [[ "${RUN_SMOKE}" == "true" ]]; then
            RUN_CLASS="smoke"
          fi

          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 \
            -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            APP_DIR="${APP_DIR}" RUN_CLASS="${RUN_CLASS}" HOUSEKEEPING_DRY_RUN="${HOUSEKEEPING_DRY_RUN}" 'bash -se' <<'EOF'
          set -euo pipefail
          APP_DIR="${APP_DIR}"
          BIN="${APP_DIR}/target/release/cli"
          ENV_FILE="/home/ubuntu/pump-launch-quant.env"
          OUT_DIR="${APP_DIR}/data/reports/pre_run_housekeeping/latest"

          if [[ ! -f "${ENV_FILE}" ]]; then
            echo "::error::VPS env file not found at ${ENV_FILE}"
            exit 1
          fi

          rm -rf "${OUT_DIR}"
          mkdir -p "${OUT_DIR}"
          DRY_RUN_ARGS=()
          if [[ "${HOUSEKEEPING_DRY_RUN:-false}" == "true" ]]; then
            DRY_RUN_ARGS+=(--dry-run)
          fi

          "${BIN}" vps-pre-run-housekeeping \
            --config "${APP_DIR}/config/default.toml" \
            --config-override "${APP_DIR}/config/local.toml" \
            --env-file "${ENV_FILE}" \
            --run-class "${RUN_CLASS}" \
            --output-dir "${OUT_DIR}" \
            --verify-r2 \
            --json \
            "${DRY_RUN_ARGS[@]}"
          EOF

      - name: Run optional smoke cycle on VPS
        if: ${{ github.event.inputs.run_smoke == 'true' }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          SMOKE_DURATION_SECONDS: ${{ github.event.inputs.smoke_duration_seconds }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          SMOKE_DURATION_SECONDS="${SMOKE_DURATION_SECONDS:-120}"

          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 \
            -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            APP_DIR="${APP_DIR}" SMOKE_DURATION_SECONDS="${SMOKE_DURATION_SECONDS}" 'bash -se' <<'EOF'
          set -euo pipefail
          APP_DIR="${APP_DIR}"
          SMOKE_DURATION_SECONDS="${SMOKE_DURATION_SECONDS:-120}"
          BIN="${APP_DIR}/target/release/cli"
          VALIDATE_CONFIG=(--config "${APP_DIR}/config/default.toml" --config-override "${APP_DIR}/config/local.toml")
          ENV_FILE="/home/ubuntu/pump-launch-quant.env"

          if [[ -f "${ENV_FILE}" ]]; then
            set -a
            # The edge smoke run needs the same provider/R2 env as the systemd service.
            # Do not print this file: GitHub masking is not a substitute for not logging secrets.
            source "${ENV_FILE}"
            set +a
          else
            echo "::error::VPS env file not found at ${ENV_FILE}"
            exit 1
          fi

          python3 - <<'PY'
          import json
          import os

          required = [
              "GRPC_URL",
              "R2_ACCESS_KEY_ID",
              "R2_SECRET_ACCESS_KEY",
              "R2_ENDPOINT",
              "R2_DATASET_BUCKET",
          ]
          print(json.dumps({
              "edge_smoke_env_loaded": True,
              "env_file_path": "/home/ubuntu/pump-launch-quant.env",
              "required_env_present": {name: bool(os.environ.get(name)) for name in required},
          }, indent=2))
          PY

          STATUS_BEFORE="$("${BIN}" autopilot-status "${VALIDATE_CONFIG[@]}")"
          PREVIOUS_RUN_ID="$(printf '%s' "${STATUS_BEFORE}" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data.get("last_completed_run_id") or "")')"
          LOCK_PATH="${APP_DIR}/data/autopilot/autopilot.lock"

          if [[ -f "${LOCK_PATH}" ]]; then
            export LOCK_PATH STATUS_BEFORE
            python3 -c 'import json, os; from pathlib import Path; lock=json.loads(Path(os.environ["LOCK_PATH"]).read_text(encoding="utf-8")); status=json.loads(os.environ["STATUS_BEFORE"]); print(json.dumps({"autopilot_lock_preflight":"blocked","lock_pid":lock.get("pid"),"lock_cycle_id":lock.get("cycle_id"),"lock_acquired_at":lock.get("acquired_at"),"lock_heartbeat_at":lock.get("heartbeat_at"),"status_state":status.get("state"),"status_current_run_id":status.get("current_run_id"),"status_last_completed_run_id":status.get("last_completed_run_id"),"status_last_provider_status":status.get("provider_status"),"status_next_scheduled_action":status.get("next_scheduled_action")}, indent=2))'
            LOCK_PID="$(python3 -c 'import json, os; from pathlib import Path; print(json.loads(Path(os.environ["LOCK_PATH"]).read_text(encoding="utf-8")).get("pid", ""))')"
            if [[ -n "${LOCK_PID}" ]]; then
              ps -fp "${LOCK_PID}" || true
            fi
            echo "::error::Autopilot lock exists before smoke; refusing to overlap edge collection"
            exit 1
          fi

          "${BIN}" run-autopilot "${VALIDATE_CONFIG[@]}" \
            --mode edge-collector \
            --once \
            --duration-seconds "${SMOKE_DURATION_SECONDS}" \
            --status-interval-seconds 30

          STATUS_AFTER="$("${BIN}" autopilot-status "${VALIDATE_CONFIG[@]}")"
          LATEST_RUN_ID="$(printf '%s' "${STATUS_AFTER}" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data.get("last_completed_run_id") or "")')"

          if [[ -n "${LATEST_RUN_ID}" && "${LATEST_RUN_ID}" != "${PREVIOUS_RUN_ID}" ]]; then
            "${BIN}" verify-run-segments "${VALIDATE_CONFIG[@]}" --run-id "${LATEST_RUN_ID}"
            "${BIN}" verify-r2-upload "${VALIDATE_CONFIG[@]}" --run-id "${LATEST_RUN_ID}" --check-manifest-consistency
          else
            echo "::error::Smoke cycle did not produce a new completed run"
            printf '%s\n' "${STATUS_AFTER}"
            exit 1
          fi

          DATASET_INDEX_AFTER_PATH="$(mktemp)"
          "${BIN}" inspect-dataset-index "${VALIDATE_CONFIG[@]}" > "${DATASET_INDEX_AFTER_PATH}"

          export PREVIOUS_RUN_ID LATEST_RUN_ID
          export DATASET_INDEX_AFTER_PATH

          python3 - <<'PY'
          import json
          import os
          with open(os.environ["DATASET_INDEX_AFTER_PATH"], "r", encoding="utf-8") as fh:
              data = json.load(fh)
          print(json.dumps({
              "smoke_run_attempted": True,
              "smoke_duration_seconds": int(os.environ.get("SMOKE_DURATION_SECONDS", "120")),
              "previous_last_completed_run_id": os.environ["PREVIOUS_RUN_ID"],
              "latest_last_completed_run_id": os.environ["LATEST_RUN_ID"],
              "new_run_detected": bool(os.environ["LATEST_RUN_ID"]) and os.environ["LATEST_RUN_ID"] != os.environ["PREVIOUS_RUN_ID"],
              "dataset_index_run_count": data.get("run_count"),
          }, indent=2))
          PY
          EOF

      - name: Run Geyser provider diagnostic on VPS
        if: ${{ github.event.inputs.run_geyser_diagnostic == 'true' }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"

          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=30 \
            -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            APP_DIR="${APP_DIR}" 'bash -se' <<'EOF'
          set -euo pipefail
          APP_DIR="${APP_DIR}"
          BIN="${APP_DIR}/target/release/cli"
          VALIDATE_CONFIG=(--config "${APP_DIR}/config/default.toml" --config-override "${APP_DIR}/config/local.toml")
          ENV_FILE="/home/ubuntu/pump-launch-quant.env"
          OUT_DIR="${APP_DIR}/data/reports/phase100_provider_unblock"
          LOCK_PATH="${APP_DIR}/data/autopilot/autopilot.lock"

          if [[ -f "${ENV_FILE}" ]]; then
            set -a
            source "${ENV_FILE}"
            set +a
          else
            echo "::error::VPS env file not found at ${ENV_FILE}"
            exit 1
          fi

          rm -rf "${OUT_DIR}"
          mkdir -p "${OUT_DIR}"

          {
            echo "# Phase 100 Provider Unblock Safety Precheck"
            echo
            echo "## systemd timer"
            systemctl status pump-launch-quant-edge-once.timer --no-pager || true
            echo
            echo "## systemd service"
            systemctl status pump-launch-quant-edge-once.service --no-pager || true
            echo
            echo "## autopilot-status"
            "${BIN}" autopilot-status "${VALIDATE_CONFIG[@]}" || true
            echo
            echo "## disk-preflight"
            "${BIN}" disk-preflight "${VALIDATE_CONFIG[@]}" || true
            echo
            echo "## edge-only footprint"
            "${BIN}" validate-vps-edge-only-footprint "${VALIDATE_CONFIG[@]}" || true
            echo
            echo "## stream-only"
            "${BIN}" validate-stream-only "${VALIDATE_CONFIG[@]}" || true
            echo
            echo "## edge mode"
            "${BIN}" validate-edge-mode "${VALIDATE_CONFIG[@]}" || true
          } > "${OUT_DIR}/safety_precheck.md"

          "${BIN}" autopilot-status "${VALIDATE_CONFIG[@]}" > "${OUT_DIR}/safety_autopilot_status.json" || true
          "${BIN}" disk-preflight "${VALIDATE_CONFIG[@]}" > "${OUT_DIR}/safety_disk_preflight.json" || true
          "${BIN}" validate-vps-edge-only-footprint "${VALIDATE_CONFIG[@]}" > "${OUT_DIR}/safety_edge_footprint.json" || true
          "${BIN}" validate-stream-only "${VALIDATE_CONFIG[@]}" > "${OUT_DIR}/safety_stream_only.json" || true
          "${BIN}" validate-edge-mode "${VALIDATE_CONFIG[@]}" > "${OUT_DIR}/safety_edge_mode.json" || true

          if [[ -f "${LOCK_PATH}" ]]; then
            export LOCK_PATH
            python3 - <<'PY' > "${OUT_DIR}/safety_lock.json"
          import json, os
          from pathlib import Path
          lock = json.loads(Path(os.environ["LOCK_PATH"]).read_text(encoding="utf-8"))
          print(json.dumps(lock, indent=2))
          PY
