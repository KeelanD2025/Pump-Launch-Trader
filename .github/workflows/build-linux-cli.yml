      - name: Run relay-only control action on VPS
        if: ${{ github.event.inputs.relay_control_action != '' }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          RELAY_CONTROL_ACTION: ${{ github.event.inputs.relay_control_action }}
          RELAY_RECEIVER_URL: ${{ secrets.RELAY_RECEIVER_URL }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          ACTION="${RELAY_CONTROL_ACTION}"
          case "${ACTION}" in
            deploy|start|status|stop|collect_health|probe) ;;
            *)
              echo "::error::Unsupported relay_control_action=${ACTION}"
              exit 1
              ;;
          esac

          ssh -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            APP_DIR="${APP_DIR}" ACTION="${ACTION}" RELAY_RECEIVER_URL="${RELAY_RECEIVER_URL:-}" 'bash -se' <<'EOF'
          set -euo pipefail
          APP_DIR="${APP_DIR}"
          BIN="${APP_DIR}/target/release/cli"
          VALIDATE_CONFIG=(--config "${APP_DIR}/config/default.toml" --config-override "${APP_DIR}/config/local.toml")
          ENV_FILE="/home/ubuntu/pump-launch-quant.env"
          HEALTH_DIR="/run/pump-launch-quant/stream-relay"
          SERVICE_NAME="pump-launch-quant-stream-relay.service"

          if [[ -f "${ENV_FILE}" ]]; then
            set -a
            source "${ENV_FILE}"
            set +a
          fi

          if sudo systemctl list-units --type=service --state=running 'pump-launch-quant-material-hunter-*.service' --no-legend | grep -q .; then
            echo "::error::Material hunter service is running; relay control refuses to overlap"
            exit 1
          fi

          case "${ACTION}" in
            deploy|status|collect_health)
              mkdir -p "${HEALTH_DIR}"
              "${BIN}" vps-stream-relay "${VALIDATE_CONFIG[@]}" \
                --receiver-url "${RELAY_RECEIVER_URL:-}" \
                --health-dir "${HEALTH_DIR}" \
                --dry-run \
                --json > "${HEALTH_DIR}/relay_control_summary.json"
              ;;
            probe)
              mkdir -p "${HEALTH_DIR}/probe"
              "${BIN}" relay-health-probe "${VALIDATE_CONFIG[@]}" \
                --receiver-url "${RELAY_RECEIVER_URL:-}" \
                --health-dir "${HEALTH_DIR}/probe" \
                --json > "${HEALTH_DIR}/probe/relay_health_probe_stdout.json"
              ;;
            start)
              if [[ -z "${RELAY_RECEIVER_URL:-}" ]]; then
                echo "::error::RELAY_RECEIVER_URL secret is required before relay start"
                exit 1
              fi
              cat > "/tmp/pump-launch-quant-stream-relay-wrapper.sh" <<'WRAP'
          #!/usr/bin/env bash
          set -euo pipefail
          exec "${APP_DIR}/target/release/cli" vps-stream-relay \
            --config "${APP_DIR}/config/default.toml" \
            --config-override "${APP_DIR}/config/local.toml" \
            --receiver-url "${RELAY_RECEIVER_URL}" \
            --health-dir "/run/pump-launch-quant/stream-relay" \
            --duration-seconds 900 \
            --json
          WRAP
              chmod +x "/tmp/pump-launch-quant-stream-relay-wrapper.sh"
              sudo systemd-run \
                --unit="${SERVICE_NAME%.service}" \
                --property=RuntimeMaxSec=1020 \
                --property=WorkingDirectory="${APP_DIR}" \
                --property=Environment="APP_DIR=${APP_DIR}" \
                --property=Environment="RELAY_RECEIVER_URL=${RELAY_RECEIVER_URL}" \
                "/tmp/pump-launch-quant-stream-relay-wrapper.sh"
              ;;
            stop)
              sudo systemctl stop "${SERVICE_NAME}" || true
              ;;
          esac

          if [[ -f "${APP_DIR}/data/reports/phase107b_material_candidate_hunter/latest_run_id" ]]; then
            cp "${APP_DIR}/data/reports/phase107b_material_candidate_hunter/latest_run_id" "${HEALTH_DIR}/material_hunter_latest_run_id_observed"
          fi
          test ! -f "${HEALTH_DIR}/attempt_ledger.csv"
          test ! -f "${HEALTH_DIR}/candidate_summary.csv"
          test ! -f "${HEALTH_DIR}/rejected_summary.csv"
          EOF

      - name: Download relay-only health reports from VPS
        if: ${{ always() && github.event.inputs.relay_control_action != '' }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          LOCAL_RELAY_DIR="vps-stream-relay-health"
          rm -rf "${LOCAL_RELAY_DIR}"
          mkdir -p "${LOCAL_RELAY_DIR}"
          ssh -p "${PORT}" "${VPS_USER}@${VPS_HOST}" APP_DIR="${APP_DIR}" 'bash -se' <<'EOF' | tar -xzf - -C "${LOCAL_RELAY_DIR}" --strip-components=1
          set -euo pipefail
          HEALTH_DIR="/run/pump-launch-quant/stream-relay"
          if [[ ! -d "${HEALTH_DIR}" ]]; then
            echo "relay health directory not found: ${HEALTH_DIR}" >&2
            exit 1
          fi
          tar -czf - -C /run/pump-launch-quant stream-relay
          EOF

      - name: Upload relay-only health reports
        if: ${{ always() && github.event.inputs.relay_control_action != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: vps-stream-relay-health
          path: vps-stream-relay-health
          if-no-files-found: error

      - name: Run provider health probe on VPS
        if: ${{ github.event.inputs.run_provider_health_probe == 'true' }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          PROBE_DURATION_SECONDS: ${{ github.event.inputs.provider_health_probe_duration_seconds }}
          PROBE_MAX_UPDATES: ""
          PROBE_OUTPUT_DIR: ""
          PROBE_UPLOAD_R2: "false"
          EXPECTED_COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          PROBE_DURATION_SECONDS="${PROBE_DURATION_SECONDS:-900}"
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 \
            -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            APP_DIR="${APP_DIR}" PROBE_DURATION_SECONDS="${PROBE_DURATION_SECONDS}" PROBE_MAX_UPDATES="${PROBE_MAX_UPDATES}" PROBE_OUTPUT_DIR="${PROBE_OUTPUT_DIR}" PROBE_UPLOAD_R2="${PROBE_UPLOAD_R2}" EXPECTED_COMMIT_SHA="${EXPECTED_COMMIT_SHA}" 'bash -se' <<'EOF'
          set -euo pipefail
          APP_DIR="${APP_DIR}"
          BIN="${APP_DIR}/target/release/cli"
          ENV_FILE="/home/ubuntu/pump-launch-quant.env"
          VALIDATE_CONFIG=(--config "${APP_DIR}/config/default.toml" --config-override "${APP_DIR}/config/local.toml")
          PROBE_PARENT="${PROBE_OUTPUT_DIR:-${APP_DIR}/data/reports/provider_health_probe}"
          mkdir -p "${PROBE_PARENT}"

          if sudo systemctl list-units --type=service --state=running 'pump-launch-quant-material-hunter-*.service' --no-legend | grep -q .; then
            echo "::error::A material hunter service is active; refusing provider probe overlap"
            exit 1
          fi

          if [[ -f "${ENV_FILE}" ]]; then
            set -a
            source "${ENV_FILE}"
            set +a
          else
            echo "::error::VPS env file not found at ${ENV_FILE}"
            exit 1
          fi

          if [[ -f "${APP_DIR}/target/release/build_info.json" ]]; then
            DEPLOYED_COMMIT="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("git_sha",""))' "${APP_DIR}/target/release/build_info.json")"
          else
            DEPLOYED_COMMIT=""
          fi
          echo "provider-health-probe deployed_commit=${DEPLOYED_COMMIT}"
          echo "provider-health-probe expected_commit=${EXPECTED_COMMIT_SHA}"
          if [[ -z "${DEPLOYED_COMMIT}" || "${DEPLOYED_COMMIT}" != "${EXPECTED_COMMIT_SHA}" ]]; then
            echo "::error::Deployed CLI commit mismatch for provider health probe"
            exit 1
          fi

          PROBE_CMD=("${BIN}" provider-health-probe "${VALIDATE_CONFIG[@]}" --duration-seconds "${PROBE_DURATION_SECONDS}" --report-dir "${PROBE_PARENT}" --json)
          if [[ -n "${PROBE_MAX_UPDATES}" ]]; then
            PROBE_CMD+=(--max-updates "${PROBE_MAX_UPDATES}")
          fi

          STDOUT_JSON="$(mktemp)"
          "${PROBE_CMD[@]}" > "${STDOUT_JSON}"
          PROBE_RUN_ID="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("probe_run_id",""))' "${STDOUT_JSON}")"
          if [[ -z "${PROBE_RUN_ID}" ]]; then
            echo "::error::provider-health-probe did not emit probe_run_id"
            cat "${STDOUT_JSON}"
            exit 1
          fi
          PROBE_DIR="${PROBE_PARENT}/${PROBE_RUN_ID}"
          cp "${STDOUT_JSON}" "${PROBE_DIR}/provider_health_probe_stdout.json"
          printf '%s\n' "${PROBE_RUN_ID}" > "${PROBE_PARENT}/latest_probe_run_id"

          for required in provider_health_probe_summary.json provider_health_probe_liveness.csv provider_health_probe_exit_status.json; do
            if [[ ! -f "${PROBE_DIR}/${required}" ]]; then
              echo "::error::provider-health-probe missing required artifact ${required}"
              exit 1
            fi
          done

          if [[ "${PROBE_UPLOAD_R2}" == "true" ]]; then
            "${BIN}" upload-phase-report-dir-r2 "${VALIDATE_CONFIG[@]}" \
              --env-file "${ENV_FILE}" \
              --phase-prefix provider_health_probe \
              --run-or-mint "${PROBE_RUN_ID}" \
              --local-output-dir "${PROBE_DIR}" \
              --verify > "${PROBE_DIR}/provider_health_probe_r2_upload.json"
          fi

          python3 - "${PROBE_DIR}" "${DEPLOYED_COMMIT}" <<'PY'
          import json, sys
          from pathlib import Path
          probe_dir = Path(sys.argv[1])
          deployed_commit = sys.argv[2]
          summary = json.loads((probe_dir / "provider_health_probe_summary.json").read_text(encoding="utf-8"))
          exit_status = json.loads((probe_dir / "provider_health_probe_exit_status.json").read_text(encoding="utf-8"))
          liveness = probe_dir / "provider_health_probe_liveness.csv"
          blockers = []
          if not liveness.exists() or liveness.stat().st_size == 0:
              blockers.append("missing_or_empty_liveness")
          if summary.get("acceptance_result") not in {"PASS", "BLOCK"}:
              blockers.append("invalid_acceptance_result")
          if exit_status.get("acceptance_result") != summary.get("acceptance_result"):
              blockers.append("exit_status_summary_mismatch")
          if summary.get("off_vps_candidate_replay_allowed") is not False:
              blockers.append("probe_replay_allowed")
          if summary.get("formal_backtesting_allowed") is not False:
              blockers.append("probe_backtesting_allowed")
          if summary.get("threshold_tuning_allowed") is not False:
              blockers.append("probe_threshold_tuning_allowed")
          result = {
              "schema_version": "phase107.provider_health_probe_workflow_summary.v1",
              "probe_run_id": summary.get("probe_run_id"),
              "deployed_commit": deployed_commit,
              "acceptance_result": summary.get("acceptance_result"),
              "blocker_reason": summary.get("blocker_reason"),
              "provider_status": summary.get("provider_status"),
              "provider_blocker_class": summary.get("provider_blocker_class"),
              "provider_data_loss_seen": summary.get("provider_data_loss_seen"),
              "provider_update_count": summary.get("provider_update_count"),
              "provider_update_rate_per_second": summary.get("provider_update_rate_per_second"),
              "pump_update_count": summary.get("pump_update_count"),
              "pump_update_rate_per_second": summary.get("pump_update_rate_per_second"),
              "first_update_latency_ms": summary.get("first_update_latency_ms"),
              "provider_progress_stalled": summary.get("provider_progress_stalled"),
              "pump_progress_stalled": summary.get("pump_progress_stalled"),
              "workflow_artifact_blockers": blockers,
              "material_hunter_started": False,
              "latest_run_id_modified": False,
          }
          (probe_dir / "provider_health_probe_workflow_summary.json").write_text(json.dumps(result, indent=2) + "\n", encoding="utf-8")
          print(json.dumps(result, indent=2))
          if blockers:
              raise SystemExit(1)
          PY
          EOF

      - name: Download provider health probe reports from VPS
        if: ${{ always() && github.event.inputs.run_provider_health_probe == 'true' }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          PROBE_OUTPUT_DIR: ""
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/home/ubuntu/pump-launch-quant}"
          LOCAL_PROBE_DIR="provider-health-probe"
          rm -rf "${LOCAL_PROBE_DIR}"
