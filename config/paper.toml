min_edge_confidence = "0.35"
fee_safety_margin_multiplier = "1.20"
latency_safety_margin_multiplier = "1.20"
allow_watch_without_trade = true

[ttl]
discovered_secs = 900
active_light_secs = 1800
active_deep_secs = 7200
discarded_summary_secs = 259200
research_sample_secs = 604800

