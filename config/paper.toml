min_expected_saved_loss_quote = "0.02"
min_emergency_exit_net_benefit_quote = "0.01"
min_latency_edge_ratio = "1.10"
allow_arm_when_net_benefit_negative = true
allow_emergency_when_net_benefit_negative = false
absorption_downgrade_enabled = true
absorption_downgrade_threshold = "0.75"
dev_sell_exit_threshold_pct = "5.0"
top_holder_exit_threshold_pct = "10.0"
bundle_cluster_exit_threshold_pct = "12.0"
same_slot_multi_sell_escalation = true
max_tentative_event_age_ms = 750
tentative_reconciliation_ttl_ms = 5000
