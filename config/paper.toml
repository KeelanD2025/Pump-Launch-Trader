prefer_account_effect_confirmation = true

[shred_exit.calibration]
enabled = true
paper_only = true
path = "data/calibration/shred_exit_calibration.json"
min_samples_before_adapt = 50
max_threshold_adjustment_per_hour = "0.05"
false_positive_rate_limit = "0.10"
missed_sell_rate_limit = "0.05"
persist_calibration = true
max_live_threshold_adjustment = "0.0"

[execution]
enabled = false
live_enabled = false
paper_enabled = true
use_rpc_send = false
use_stream_blockhash_cache = true
max_daily_loss_quote = "250.0"
max_open_positions = 2
max_position_size_quote = "1.00"
max_trades_per_minute = 8
max_fee_quote = "0.20"
max_slippage_bps = 250

[paper]
enabled = true
