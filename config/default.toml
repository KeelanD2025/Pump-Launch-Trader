[environment]
cluster = "mainnet-beta"
run_id = "paper-default"
strategy_version = "phase-13-runtime"
schema_version = 1

[runtime]
mode = "paper_from_store"
queue_capacity_canonical = 2048
queue_capacity_tentative = 1024
queue_capacity_decisions = 512
shutdown_drain_timeout_ms = 2000
health_report_interval_ms = 1000

[edge_collector]
enabled = false
stream_only_required = true
paper_decisions_enabled = false
feature_engine_enabled = false
risk_engine_enabled = false
decision_engine_enabled = false
paper_executor_enabled = false
research_reports_enabled = false
large_exports_enabled = false
local_analysis_enabled = false
r2_upload_required = true
r2_verify_required = true
minimal_status_reports = true
max_local_runtime_mb = 256
flush_interval_seconds = 15
segment_max_size_mb = 4
segment_max_age_seconds = 30
keep_local_segments_after_verify = false
keep_only_last_open_segment = true
allow_rpc_enrichment = false
allow_metadata_fetch = false
allow_social_fetch = false
allow_wallet_history_rpc = false
allow_bundle_enrichment_rpc = false

[edge_collector.storage]
segment_dir = "data/edge_segments"
max_open_segments = 4
max_local_segment_mb = 64
delete_verified_segments_immediately = true
require_r2_verified_before_delete = true
forbid_large_local_exports = true
forbid_feature_snapshot_files = true
forbid_research_reports = true

[research_worker]
enabled = false
input = "r2"
r2_dataset_index_required = true
download_segments = true
stream_segments_from_r2 = true
compute_features = true
compute_risk = true
compute_decisions = true
run_backtests = true
generate_reports = true
generate_exports = true
update_calibration = true
local_output_dir = "research_output"

[research_worker.persistence]
feature_snapshot_chunk_rows = 50000
feature_snapshot_compress = true
feature_snapshot_format = "jsonl.zst"
decision_chunk_rows = 50000
decision_compress = true
disable_per_snapshot_files = true
buffered_writes = true
max_local_uncompressed_mb = 256

[research_worker.replay]
dirty_token_only = true
cohort_recompute_interval_events = 250
cohort_recompute_interval_ms = 5000
feature_snapshot_min_interval_events_per_token = 5
feature_snapshot_min_interval_ms_per_token = 1000
force_snapshot_on_lifecycle_change = true
force_snapshot_on_decision_boundary = true

[research_worker.exports]
compressed_only = true
chunk_rows = 50000
buffered_writes = true
skip_csv_by_default = false
allow_skip_csv_export = true

[research_worker.pnl_sanity]
enabled = true
max_fill_to_reserve_price_ratio = 10.0
exclude_scenario_end_without_decision = true
exclude_missing_trigger_event = true
preserve_artifact_fills_in_audit = true

[enrichment]
enabled = true
mode = "research_only"
run_after_replay = true
run_on_vps = false
require_stream_source_first = true
cache_enabled = true
cache_dir = "research_output/enrichment_cache"
ledger_path = "research_output/enrichment_ledger.jsonl"
max_daily_rpc_calls = 5000
max_daily_rpc_credits = 5000
max_daily_http_metadata_fetches = 2000
max_wallets_per_run = 500
max_tokens_per_run = 1000
max_signatures_per_wallet = 25
max_metadata_bytes = 262144
request_timeout_ms = 5000
max_retries = 2
respect_robots = false
block_private_ips = true
deny_localhost = true
deny_link_local = true
deny_private_ranges = true

[enrichment.rpc]
allow_funding_graph_rpc = true
allow_bundle_evidence_rpc = true
allow_wallet_age_rpc = true
allow_metadata_account_rpc = true
allow_token_largest_accounts_rpc = false
